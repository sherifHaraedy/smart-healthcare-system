name: Test Big Data Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize environment configuration
      run: |
        cp hadoop.env.example hadoop.env
        cp hadoop-hive.env.example hadoop-hive.env

    - name: Prepare script permissions
      run: make setup

    - name: Execute end-to-end pipeline
      run: make pipeline

    - name: Capture and verify output artifacts
      run: make artifacts

    - name: Debug cluster state on failure
      if: failure()
      run: |
        docker ps -a
        docker logs spark-master || true
        docker logs hive-server || true